<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found</title>
    <style>
      :root{--bg:#f4f7ff;--surface:#ffffff;--accent:#4f46e5;--accent-soft:#eef2ff;--text:#111827;--muted:#6b7280;--shadow:0 20px 80px rgba(15,23,42,0.08)}
      *{box-sizing:border-box}
      html,body{margin:0;padding:0;min-height:100%;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#eef2ff 0%,#f8fafc 100%);color:var(--text)}
      body{display:flex;align-items:center;justify-content:center;padding:2rem}
      .notfound-card{max-width:760px;width:100%;background:var(--surface);border-radius:32px;box-shadow:var(--shadow);padding:3rem;display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:center}
      .notfound-hero{padding-right:1rem}
      .notfound-hero h1{font-size:4.5rem;line-height:1;letter-spacing:-0.06em;margin:0;color:var(--accent)}
      .notfound-hero h2{font-size:1.75rem;margin:1rem 0 0.75rem;max-width:18rem}
      .notfound-hero p{margin:0 0 1.5rem;color:var(--muted);line-height:1.75}
      .btn{display:inline-flex;align-items:center;justify-content:center;padding:0.95rem 1.6rem;border-radius:999px;border:0;font-weight:600;text-decoration:none;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease}
      .btn.primary{background:var(--accent);color:#fff;box-shadow:0 18px 35px rgba(79,70,229,0.18)}
      .btn.primary:hover{transform:translateY(-1px);box-shadow:0 24px 40px rgba(79,70,229,0.24)}
      .info-box{background:var(--accent-soft);padding:1rem 1.25rem;border-radius:18px;color:var(--accent);display:inline-flex;align-items:center;gap:0.75rem;font-weight:600;margin-top:1rem}
      .info-box span{display:inline-flex;width:2rem;height:2rem;align-items:center;justify-content:center;border-radius:50%;background:#eef2ff;color:var(--accent)}
      .notfound-visual{display:grid;place-items:center}
      .notfound-art{width:100%;max-width:260px;padding:1.5rem;border-radius:28px;background:linear-gradient(180deg,#eef2ff,#fff);box-shadow:0 24px 60px rgba(15,23,42,0.09);border:1px solid rgba(79,70,229,0.08)}
      .notfound-art::before{content:'';display:block;width:100%;height:220px;border-radius:22px;background:linear-gradient(135deg,#8b5cf6,#6366f1);margin-bottom:1.5rem;position:relative;}
      .notfound-art::after{content:'';position:absolute;top:2.5rem;left:50%;transform:translateX(-50%);width:140px;height:140px;background:radial-gradient(circle,#ffffff 0%,rgba(255,255,255,0) 60%);border-radius:50%;opacity:.85}
      .notfound-tags{display:grid;gap:1rem;margin-top:1.5rem}
      .notfound-tag{padding:0.85rem 1rem;border-radius:20px;background:#f8fafc;color:var(--text);font-size:.95rem;box-shadow:inset 0 0 0 1px rgba(15,23,42,0.05)}
      @media (max-width:860px){.notfound-card{grid-template-columns:1fr;gap:1.5rem}.notfound-hero{padding-right:0}.notfound-hero h1{font-size:3.5rem}.notfound-art{max-width:100%}} 
      @media (max-width:520px){body{padding:1rem}.notfound-card{padding:2rem;border-radius:24px}.notfound-hero h1{font-size:3rem}.notfound-hero h2{font-size:1.5rem}}
    </style>
  </head>
  <body>
    <div class="notfound-card">
      <div class="notfound-hero">
        <div class="info-box"><span>404</span>Page not found</div>
        <h1>Looks like you took a wrong turn.</h1>
        <h2>The page you’re looking for doesn’t exist.</h2>
        <p>Return to the homepage or head to the admin panel to keep exploring the application.</p>
        <a class="btn primary" href="/">Back to Home</a>
        <div class="notfound-tags">
          <div class="notfound-tag">Home route: /</div>
          <div class="notfound-tag">Admin panel: /admin</div>
        </div>
      </div>
      <div class="notfound-visual">
        <div class="notfound-art"></div>
      </div>
    </div>
  </body>
</html>
